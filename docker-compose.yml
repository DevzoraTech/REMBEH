services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rembeh
      POSTGRES_USER: rembeh
      POSTGRES_PASSWORD: rembeh
    ports:
      - "5432:5432"
    volumes:
      - rembeh-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rembeh -d rembeh"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - rembeh-redis:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rembeh
      MINIO_ROOT_PASSWORD: rembeh-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rembeh-minio:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  rembeh-postgres:
  rembeh-redis:
  rembeh-minio:
