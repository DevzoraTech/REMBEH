# REMBEH marketing site — get.rembeh.antikra.com → static files from /var/www/rembeh-get
#
# Installed by scripts/ensure-nginx-web.sh (every web/website deploy).
# Must NOT share server_name with rembeh.antikra.com or rembeh-api.antikra.com.
# Must NOT use default_server on 443.

# HTTP — always serve static (or redirect when TLS is present; see ensure script)
server {
    listen 80;
    listen [::]:80;
    server_name get.rembeh.antikra.com;

    root /var/www/rembeh-get;
    index index.html;

    # Next.js static export with trailingSlash
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
