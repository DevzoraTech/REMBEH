# REMBEH API — rembeh-api.antikra.com → NestJS on 127.0.0.1:4000
#
# Installed by scripts/ensure-nginx-web.sh (safe from both web and API deploys).
# server_name MUST be only rembeh-api.antikra.com — never rembeh.antikra.com,
# never _, and never default_server on 443. Otherwise HTTPS for the web host
# falls through to Nest and returns JSON like {"message":"Cannot GET /dashboard"}.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rembeh-api.antikra.com;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/rembeh-api.antikra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rembeh-api.antikra.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name rembeh-api.antikra.com;

    if ($host = rembeh-api.antikra.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
