# REMBEH web — rembeh.antikra.com → Next.js on 127.0.0.1:3000
#
# Installed by scripts/ensure-nginx-web.sh (every web deploy).
# Must NOT share server_name with rembeh-api.antikra.com.
# Must NOT use default_server on 443 — that lets the API catch HTTPS for other hostnames.

# Shared branded error pages (static HTML; works when Next.js is down)
# Installed to /var/www/rembeh-errors by ensure-nginx-web.sh

# IP access + unmatched Host on HTTP only
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Intercept upstream 5xx (and connection failures → 502) so branded pages
    # render even when Next.js is down. Leave 404 to Next.js when upstream is up.
    proxy_intercept_errors on;
    error_page 500 /errors/500.html;
    error_page 502 /errors/502.html;
    error_page 503 /errors/503.html;
    error_page 504 /errors/504.html;

    location ^~ /errors/ {
        alias /var/www/rembeh-errors/;
        default_type text/html;
        charset utf-8;
        internal;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}

# HTTP → HTTPS for the web domain
server {
    listen 80;
    listen [::]:80;
    server_name rembeh.antikra.com www.rembeh.antikra.com;
    return 301 https://$host$request_uri;
}

# HTTPS → Next.js
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rembeh.antikra.com www.rembeh.antikra.com;

    ssl_certificate /etc/letsencrypt/live/rembeh.antikra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rembeh.antikra.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    proxy_intercept_errors on;
    error_page 500 /errors/500.html;
    error_page 502 /errors/502.html;
    error_page 503 /errors/503.html;
    error_page 504 /errors/504.html;

    location ^~ /errors/ {
        alias /var/www/rembeh-errors/;
        default_type text/html;
        charset utf-8;
        internal;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
