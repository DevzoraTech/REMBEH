# REMBEH web — rembeh.antikra.com → Next.js on 127.0.0.1:3000
#
# Installed by scripts/ensure-nginx-web.sh (every web deploy).
# Must NOT share server_name with rembeh-api.antikra.com.
# Must NOT use default_server on 443 — that lets the API catch HTTPS for other hostnames.

# IP access + unmatched Host on HTTP only
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTP → HTTPS for the web domain
server {
    listen 80;
    listen [::]:80;
    server_name rembeh.antikra.com www.rembeh.antikra.com;
    return 301 https://$host$request_uri;
}

# HTTPS → Next.js
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rembeh.antikra.com www.rembeh.antikra.com;

    ssl_certificate /etc/letsencrypt/live/rembeh.antikra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rembeh.antikra.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
